<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Studio Manager | Najarro X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        .tab-btn.active { border-bottom: 4px solid #000; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">Najarro X CMS</h1>
            </div>
            <button onclick="saveAll()" id="save-master" class="bg-black text-white px-10 py-4 rounded-2xl font-bold hover:scale-105 transition shadow-xl">GUARDAR CAMBIOS</button>
        </header>

        <div class="flex gap-8 border-b mb-10 text-gray-400 font-bold text-xs uppercase tracking-widest">
            <button onclick="showTab('general')" class="tab-btn pb-4 active" id="btn-general">General & Hero</button>
            <button onclick="showTab('galeria')" class="tab-btn pb-4" id="btn-galeria">Portafolio</button>
            <button onclick="showTab('servicios')" class="tab-btn pb-4" id="btn-servicios">Servicios</button>
        </div>

        <form id="master-form">
            <div id="tab-general" class="tab-content active space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                    <div class="grid md:grid-cols-3 gap-6">
                        <input type="text" name="nombre_negocio" placeholder="Nombre Marca" class="p-4 bg-gray-50 rounded-xl border w-full">
                        <input type="text" name="logo_url" placeholder="URL Logo" class="p-4 bg-gray-50 rounded-xl border w-full">
                        <input type="color" name="color_primario" class="w-full h-14 p-2 bg-gray-50 rounded-xl border cursor-pointer">
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        <input type="text" name="hero_bg_url" placeholder="URL Imagen Fondo" class="p-4 bg-gray-50 rounded-xl border w-full">
                        <input type="color" name="hero_text_color" class="w-full h-14 p-2 bg-gray-50 rounded-xl border cursor-pointer">
                        <input type="text" name="hero_titulo" placeholder="Título Hero" class="p-4 bg-gray-50 rounded-xl border w-full md:col-span-2">
                        <textarea name="hero_subtitulo" placeholder="Subtítulo Hero" class="p-4 bg-gray-50 rounded-xl border w-full md:col-span-2"></textarea>
                        <input type="text" name="hero_cta" placeholder="Texto Botón (CTA)" class="p-4 bg-gray-50 rounded-xl border w-full md:col-span-2">
                    </div>
                </div>
            </div>

            <div id="tab-galeria" class="tab-content">
                <div id="gallery-list" class="space-y-4"></div>
                <button type="button" onclick="addItem('gallery')" class="mt-6 w-full border-2 border-dashed py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50">+ Añadir Proyecto</button>
            </div>

            <div id="tab-servicios" class="tab-content">
                <div id="services-list" class="space-y-4"></div>
                <button type="button" onclick="addItem('service')" class="mt-6 w-full border-2 border-dashed py-4 rounded-2xl font-bold text-gray-400 hover:bg-gray-50">+ Añadir Servicio</button>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6rNV8O3K_6-TAIvDe1fSNTHbjK7EdFhkxw7oLcupWEFGwPMDToDnJlYZDQitTo2CrEw/exec';

        async function load() {
            const res = await fetch(API_URL + '?t=' + Date.now());
            const data = await res.json();
            const form = document.getElementById('master-form');
            
            form.nombre_negocio.value = data.config.nombre_negocio || '';
            form.logo_url.value = data.config.logo_url || '';
            form.color_primario.value = data.config.color_primario || '#000000';
            form.hero_bg_url.value = data.config.hero_bg_url || '';
            form.hero_text_color.value = data.config.hero_text_color || '#000000';

            const hero = data.content.find(c => c.Seccion_ID.toLowerCase() === 'hero');
            form.hero_titulo.value = hero.Titulo || '';
            form.hero_subtitulo.value = hero.Subtitulo || '';
            form.hero_cta.value = hero.CTA_Texto || '';

            data.gallery.forEach(g => addItem('gallery', g));
            data.services.forEach(s => addItem('service', s));
        }

        function addItem(type, data = {}) {
            const container = type === 'gallery' ? document.getElementById('gallery-list') : document.getElementById('services-list');
            const div = document.createElement('div');
            div.className = "bg-white p-6 rounded-2xl border shadow-sm flex flex-col md:flex-row gap-4 items-center";
            
            if(type === 'gallery') {
                div.innerHTML = `
                    <input type="text" placeholder="URL Imagen" value="${data.URL||''}" class="g-url p-3 bg-gray-50 rounded-lg border w-full">
                    <input type="text" placeholder="Título Proyecto" value="${data.Titulo||''}" class="g-titulo p-3 bg-gray-50 rounded-lg border w-full font-bold">
                    <input type="text" placeholder="Descripción" value="${data.Descripcion||''}" class="g-desc p-3 bg-gray-50 rounded-lg border w-full text-sm">
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-bold px-4">Eliminar</button>`;
            } else {
                div.innerHTML = `
                    <input type="text" placeholder="Servicio" value="${data.Servicio||''}" class="s-nombre p-3 bg-gray-50 rounded-lg border w-full font-bold">
                    <input type="number" placeholder="Precio" value="${data.Precio_Base||''}" class="s-precio p-3 bg-gray-50 rounded-lg border w-32">
                    <input type="text" placeholder="Descripción" value="${data.Descripcion||''}" class="s-desc p-3 bg-gray-50 rounded-lg border w-full">
                    <select class="s-activo p-3 bg-gray-50 rounded-lg border">
                        <option value="TRUE" ${String(data.Activo).toUpperCase()==='TRUE'?'selected':''}>Activo</option>
                        <option value="FALSE" ${String(data.Activo).toUpperCase()==='FALSE'?'selected':''}>Oculto</option>
                    </select>
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-bold px-4">Eliminar</button>`;
            }
            container.appendChild(div);
        }

        async function saveAll() {
            const btn = document.getElementById('save-master');
            btn.innerText = "GUARDANDO...";
            const form = document.getElementById('master-form');

            const payload = {
                action: 'updateFull',
                config: {
                    nombre_negocio: form.nombre_negocio.value,
                    logo_url: form.logo_url.value,
                    color_primario: form.color_primario.value,
                    hero_bg_url: form.hero_bg_url.value,
                    hero_text_color: form.hero_text_color.value
                },
                hero: {
                    titulo: form.hero_titulo.value,
                    subtitulo: form.hero_subtitulo.value,
                    cta: form.hero_cta.value
                },
                gallery: Array.from(document.querySelectorAll('#gallery-list > div')).map(div => ({
                    URL: div.querySelector('.g-url').value,
                    Titulo: div.querySelector('.g-titulo').value,
                    Descripcion: div.querySelector('.g-desc').value
                })),
                services: Array.from(document.querySelectorAll('#services-list > div')).map(div => ({
                    Servicio: div.querySelector('.s-nombre').value,
                    Precio_Base: div.querySelector('.s-precio').value,
                    Descripcion: div.querySelector('.s-desc').value,
                    Activo: div.querySelector('.s-activo').value
                }))
            };

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(() => { btn.innerText = "¡GUARDADO!"; setTimeout(()=> btn.innerText="GUARDAR CAMBIOS", 2000); }, 1500);
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        load();
    </script>
</body>
</html>
