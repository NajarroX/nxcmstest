<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NX Studio CMS | Daymode 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        /* Pantalla de Carga */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #8400db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tab-content { display: none; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .tab-btn { transition: all 0.2s; border-bottom: 3px solid transparent; color: #64748b; font-weight: 700; }
        .tab-btn.active { border-bottom: 3px solid #8400db; color: #1e293b; }

        .card-ui { 
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .label-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.5rem;
            display: block;
        }

        input, textarea, select {
            background: #f1f5f9 !important;
            border: 1px solid #e2e8f0 !important;
            color: #0f172a !important;
            border-radius: 12px !important;
            font-weight: 600;
            transition: all 0.2s;
        }

        input:focus, textarea:focus { 
            border-color: #8400db !important; 
            background: white !important; 
            box-shadow: 0 0 0 4px rgba(132, 0, 219, 0.1) !important;
            outline: none; 
        }

        .img-preview { 
            width: 100%; height: 140px; object-fit: cover; 
            border-radius: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; 
        }

        .section-header {
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #1e293b;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Sincronizando con Sheets...</p>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-[900] tracking-tighter uppercase italic text-slate-900">NX STUDIO <span class="text-[#8400db]">CMS</span></h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Control Panel Interface</p>
            </div>
            <button onclick="saveAll()" id="save-btn" class="w-full md:w-auto bg-black text-white px-12 py-4 rounded-2xl font-black uppercase italic tracking-widest hover:bg-[#8400db] transition-all shadow-lg active:scale-95">
                GUARDAR CAMBIOS
            </button>
        </header>

        <nav class="flex gap-4 border-b border-slate-200 mb-8 overflow-x-auto pb-1 no-scrollbar">
            <button id="btn-config" class="tab-btn active px-4 py-3 text-[11px] uppercase tracking-widest" onclick="showTab('config')">General</button>
            <button id="btn-hero" class="tab-btn px-4 py-3 text-[11px] uppercase tracking-widest" onclick="showTab('hero')">Hero</button>
            <button id="btn-about" class="tab-btn px-4 py-3 text-[11px] uppercase tracking-widest" onclick="showTab('about')">Nosotros</button>
            <button id="btn-galeria" class="tab-btn px-4 py-3 text-[11px] uppercase tracking-widest" onclick="showTab('galeria')">Galería</button>
            <button id="btn-servicios" class="tab-btn px-4 py-3 text-[11px] uppercase tracking-widest" onclick="showTab('servicios')">Cotizador</button>
            <button id="btn-leads" class="tab-btn px-4 py-3 text-[11px] uppercase tracking-widest border-l border-slate-200 ml-2 pl-6 text-indigo-600" onclick="showTab('leads')">Leads 📥</button>
        </nav>

        <main>
            <div id="tab-config" class="tab-content active space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="card-ui p-8">
                        <h3 class="section-header">Identidad Visual</h3>
                        <div class="space-y-5">
                            <div><label class="label-title">Nombre Comercial</label>
                                 <input type="text" id="c-nombre" class="w-full p-4 text-lg"></div>
                            <div><label class="label-title">Color de Acento</label>
                                 <input type="color" id="c-color" class="h-14 w-full cursor-pointer"></div>
                            <div><label class="label-title">WhatsApp de Ventas</label>
                                 <input type="text" id="c-wa" class="w-full p-4 font-mono"></div>
                        </div>
                    </div>
                    <div class="card-ui p-8">
                        <h3 class="section-header">Navegación del Menú</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="label-title">Link Inicio</label>
                                 <input type="text" id="c-nav-inicio" class="w-full p-3 text-sm"></div>
                            <div><label class="label-title">Link Nosotros</label>
                                 <input type="text" id="c-nav-nosotros" class="w-full p-3 text-sm"></div>
                            <div><label class="label-title">Link Proyectos</label>
                                 <input type="text" id="c-nav-proyectos" class="w-full p-3 text-sm"></div>
                            <div><label class="label-title">Link Cotizador</label>
                                 <input type="text" id="c-nav-cotizador" class="w-full p-3 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-hero" class="tab-content card-ui p-10">
                <h3 class="section-header">Hero Section</h3>
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <div><label class="label-title">Título de Impacto</label>
                             <textarea id="h-titulo" class="w-full p-4 text-2xl font-black uppercase italic leading-tight" rows="4"></textarea></div>
                        <div><label class="label-title">Subtítulo Descriptivo</label>
                             <textarea id="h-subtitulo" class="w-full p-4 text-slate-500 font-medium" rows="3"></textarea></div>
                        <div><label class="label-title">Texto CTA</label>
                             <input type="text" id="h-cta" class="w-full p-4 bg-slate-900 text-white font-bold uppercase italic"></div>
                    </div>
                    <div class="space-y-6">
                        <div><label class="label-title">Logo URL</label>
                             <input type="text" id="c-logo" class="w-full p-3 text-xs mb-3" oninput="document.getElementById('p-logo').src=this.value">
                             <img id="p-logo" src="" class="img-preview object-contain bg-slate-100 p-6"></div>
                        <div><label class="label-title">Fondo Hero URL</label>
                             <input type="text" id="c-herobg" class="w-full p-3 text-xs mb-3" oninput="document.getElementById('p-hero').src=this.value">
                             <img id="p-hero" src="" class="img-preview"></div>
                    </div>
                </div>
            </div>

            <div id="tab-about" class="tab-content card-ui p-10">
                <h3 class="section-header">Sección Nosotros</h3>
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <div><label class="label-title">Título Nosotros</label>
                             <input type="text" id="a-titulo" class="w-full p-4 text-xl font-extrabold uppercase italic"></div>
                        <div><label class="label-title">Biografía / Descripción</label>
                             <textarea id="a-desc" class="w-full p-4 leading-relaxed text-slate-600" rows="10"></textarea></div>
                    </div>
                    <div class="space-y-6">
                        <div><label class="label-title">Imagen Representativa</label>
                             <input type="text" id="a-img" class="w-full p-3 text-xs mb-3" oninput="document.getElementById('p-about').src=this.value">
                             <img id="p-about" src="" class="w-full h-72 object-cover rounded-2xl shadow-inner"></div>
                    </div>
                </div>
            </div>

            <div id="tab-galeria" class="tab-content">
                <div class="card-ui p-8 mb-8 flex flex-col md:flex-row justify-between items-end gap-6">
                    <div class="flex-1 w-full">
                        <label class="label-title">Título de la Sección Galería</label>
                        <input type="text" id="c-tit-galeria" class="w-full p-4 text-2xl font-black uppercase italic bg-slate-50 border-none">
                    </div>
                    <button onclick="addGalleryItem()" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-all">+ Añadir Proyecto</button>
                </div>
                <div id="gallery-list" class="grid md:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-servicios" class="tab-content">
                <div class="card-ui p-8 mb-8 flex flex-col md:flex-row justify-between items-end gap-6">
                    <div class="flex-1 w-full">
                        <label class="label-title">Título de la Sección Cotizador</label>
                        <input type="text" id="c-tit-cotizador" class="w-full p-4 text-2xl font-black uppercase italic bg-slate-50 border-none">
                    </div>
                    <button onclick="addServiceItem()" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-all">+ Añadir Servicio</button>
                </div>
                <div id="services-list" class="space-y-4"></div>
            </div>

            <div id="tab-leads" class="tab-content card-ui overflow-hidden">
                <div class="p-8 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">Historial de Leads</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50">
                            <tr class="text-[10px] uppercase font-bold text-slate-400 border-b border-slate-100">
                                <th class="p-6">Fecha</th>
                                <th class="p-6">Cliente</th>
                                <th class="p-6">WhatsApp</th>
                                <th class="p-6">Interés</th>
                                <th class="p-6">Presupuesto</th>
                                <th class="p-6">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6rNV8O3K_6-TAIvDe1fSNTHbjK7EdFhkxw7oLcupWEFGwPMDToDnJlYZDQitTo2CrEw/exec'; 

        const toggleLoading = (show) => {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        };

        async function load() {
            toggleLoading(true);
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // Llenado de campos (Config, Hero, About...)
                document.getElementById('c-nombre').value = data.config.nombre_negocio;
                document.getElementById('c-color').value = data.config.color_primario;
                document.getElementById('c-wa').value = data.config.whatsapp_tel;
                document.getElementById('c-logo').value = data.config.logo_url;
                document.getElementById('p-logo').src = data.config.logo_url;
                document.getElementById('c-herobg').value = data.config.hero_bg_url;
                document.getElementById('p-hero').src = data.config.hero_bg_url;
                document.getElementById('c-tit-galeria').value = data.config.titulo_galeria;
                document.getElementById('c-tit-cotizador').value = data.config.titulo_cotizador;
                document.getElementById('c-nav-inicio').value = data.config.nav_inicio;
                document.getElementById('c-nav-nosotros').value = data.config.nav_nosotros;
                document.getElementById('c-nav-proyectos').value = data.config.nav_proyectos;
                document.getElementById('c-nav-cotizador').value = data.config.nav_cotizador;

                const hero = data.content.find(c => c.Seccion_ID === 'hero');
                document.getElementById('h-titulo').value = hero.Titulo;
                document.getElementById('h-subtitulo').value = hero.Subtitulo;
                document.getElementById('h-cta').value = hero.CTA_Texto;

                document.getElementById('a-titulo').value = data.about.titulo;
                document.getElementById('a-desc').value = data.about.descripcion;
                document.getElementById('a-img').value = data.about.imagen_url;
                document.getElementById('p-about').src = data.about.imagen_url;

                // Listas Dinámicas
                document.getElementById('gallery-list').innerHTML = '';
                data.gallery.forEach(item => addGalleryItem(item));
                document.getElementById('services-list').innerHTML = '';
                data.services.forEach(item => addServiceItem(item));

                renderLeads(data.leads);
            } catch (e) { console.error(e); }
            finally { toggleLoading(false); }
        }

        function renderLeads(leads) {
            const tbody = document.getElementById('leads-table-body');
            tbody.innerHTML = '';
            if(!leads) return;

            // Invertimos para ver los más nuevos primero
            leads.reverse().forEach((l, index) => {
                // El index original en el array de Sheets sería (leads.length - index)
                const realIndex = leads.length - index; 
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/30 transition-colors text-sm";
                tr.innerHTML = `
                    <td class="p-6 text-slate-400 font-bold text-xs">${new Date(l.Fecha).toLocaleDateString()}</td>
                    <td class="p-6 font-extrabold uppercase italic text-slate-800">${l.Nombre}</td>
                    <td class="p-6 font-bold text-indigo-600"><a href="https://wa.me/${l.WhatsApp}" target="_blank">${l.WhatsApp}</a></td>
                    <td class="p-6 text-[10px] text-slate-400 font-bold uppercase">${l.Servicios_Interes}</td>
                    <td class="p-6 font-black text-slate-900 italic">$${l.Total_Estimado}</td>
                    <td class="p-6 text-right">
                        <button onclick="deleteLead(${realIndex})" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg font-black text-[10px] uppercase hover:bg-red-500 hover:text-white transition-all">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteLead(rowIndex) {
            if(!confirm("¿Seguro que deseas borrar este Lead del registro oficial?")) return;
            
            toggleLoading(true);
            try {
                // Enviamos una petición POST especial con deleteLeadIndex
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ deleteLeadIndex: rowIndex }) 
                });
                // Recargamos los datos para confirmar la eliminación
                setTimeout(load, 1500); 
            } catch (e) { 
                alert("Error al eliminar"); 
                toggleLoading(false);
            }
        }

        function addGalleryItem(item = {URL:'', Titulo:'', Descripcion:''}) {
            const div = document.createElement('div');
            div.className = "card-ui p-5 gallery-item bg-slate-50/50";
            div.innerHTML = `
                <img src="${item.URL}" class="img-preview mb-4">
                <input type="text" class="g-url w-full p-2 mb-3 text-[10px] font-mono opacity-50" value="${item.URL}" oninput="this.parentElement.querySelector('img').src=this.value">
                <input type="text" class="g-titulo w-full p-4 mb-3 font-bold uppercase italic text-xs" value="${item.Titulo}" placeholder="Título">
                <textarea class="g-desc w-full p-4 text-[11px]" rows="3">${item.Descripcion}</textarea>
                <button onclick="this.parentElement.remove()" class="w-full mt-4 text-[9px] font-black uppercase text-slate-400 hover:text-red-500 transition-colors italic">Eliminar Item</button>
            `;
            document.getElementById('gallery-list').appendChild(div);
        }

        function addServiceItem(item = {Servicio:'', Precio_Base:'', Descripcion:'', Activo:'TRUE'}) {
            const div = document.createElement('div');
            div.className = "card-ui p-6 flex flex-wrap md:flex-nowrap gap-6 items-center service-item";
            div.innerHTML = `
                <div class="flex-1"><label class="label-title">Nombre</label><input type="text" class="s-nombre w-full p-3 font-bold uppercase italic text-sm" value="${item.Servicio}"></div>
                <div class="w-32"><label class="label-title">Precio</label><input type="number" class="s-precio w-full p-3 font-black text-indigo-600" value="${item.Precio_Base}"></div>
                <div class="flex-[2]"><label class="label-title">Descripción</label><input type="text" class="s-desc w-full p-3 text-xs" value="${item.Descripcion}"></div>
                <div class="w-24"><label class="label-title">Estado</label><select class="s-activo w-full p-3 font-bold text-[10px] uppercase">
                    <option value="TRUE" ${item.Activo == 'TRUE' ? 'selected' : ''}>Online</option>
                    <option value="FALSE" ${item.Activo == 'FALSE' ? 'selected' : ''}>Offline</option>
                </select></div>
                <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 text-2xl">×</button>
            `;
            document.getElementById('services-list').appendChild(div);
        }

        async function saveAll() {
            toggleLoading(true);
            const payload = {
                config: {
                    nombre_negocio: document.getElementById('c-nombre').value,
                    color_primario: document.getElementById('c-color').value,
                    whatsapp_tel: document.getElementById('c-wa').value,
                    logo_url: document.getElementById('c-logo').value,
                    hero_bg_url: document.getElementById('c-herobg').value,
                    titulo_galeria: document.getElementById('c-tit-galeria').value,
                    titulo_cotizador: document.getElementById('c-tit-cotizador').value,
                    nav_inicio: document.getElementById('c-nav-inicio').value,
                    nav_nosotros: document.getElementById('c-nav-nosotros').value,
                    nav_proyectos: document.getElementById('c-nav-proyectos').value,
                    nav_cotizador: document.getElementById('c-nav-cotizador').value
                },
                hero: {
                    titulo: document.getElementById('h-titulo').value,
                    subtitulo: document.getElementById('h-subtitulo').value,
                    cta: document.getElementById('h-cta').value
                },
                about: {
                    titulo: document.getElementById('a-titulo').value,
                    descripcion: document.getElementById('a-desc').value,
                    imagen_url: document.getElementById('a-img').value
                },
                gallery: Array.from(document.querySelectorAll('.gallery-item')).map(div => ({
                    URL: div.querySelector('.g-url').value, Titulo: div.querySelector('.g-titulo').value, Descripcion: div.querySelector('.g-desc').value
                })),
                services: Array.from(document.querySelectorAll('.service-item')).map(div => ({
                    Servicio: div.querySelector('.s-nombre').value, Precio_Base: div.querySelector('.s-precio').value, 
                    Descripcion: div.querySelector('.s-desc').value, Activo: div.querySelector('.s-activo').value
                }))
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(load, 1000); 
            } catch (e) { alert("Error al guardar"); toggleLoading(false); }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        load();
    </script>
</body>
</html>
