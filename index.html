<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX Studio | Brutalist Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8400db; }
        body { font-family: 'Space Grotesk', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: -0.04em; }
        
        .brutalist-card { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .brutalist-card:hover { border-color: var(--primary); transform: translate(-4px, -4px); box-shadow: 8px 8px 0px var(--primary); }
        .btn-brutalist { background: var(--primary); color: white; font-family: 'Syne', sans-serif; font-weight: 800; padding: 1rem 2rem; transition: 0.3s; display: inline-block; text-align: center; cursor: pointer; border: none; }
        .btn-brutalist:hover { box-shadow: 4px 4px 0px white; transform: translate(-2px, -2px); }
        
        #mobile-menu { transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        #mobile-menu.active { transform: translateX(0); }
        
        #back-to-top { opacity: 0; visibility: hidden; transition: 0.4s; z-index: 100; }
        #back-to-top.show { opacity: 1; visibility: visible; }

        .white-section { background: white; color: black; }
        .white-section .brutalist-card { background: #f9f9f9; border: 1px solid rgba(0,0,0,0.1); color: black; }
        .white-section .brutalist-card:hover { box-shadow: 8px 8px 0px black; border-color: black; }
        
        #loader { position: fixed; inset: 0; background: black; z-index: 500; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 1.5rem; }
        .modal.active { display: flex; }

        /* Estilos para los nuevos campos de captura */
        .input-lead { background: transparent; border-bottom: 2px solid black; padding: 1rem 0.5rem; font-family: 'Syne', sans-serif; text-transform: uppercase; width: 100%; outline: none; transition: 0.3s; }
        .input-lead:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader" class="font-display text-2xl uppercase">Cargando...</div>

    <nav class="fixed w-full z-[150] p-4 md:p-6 flex justify-between items-center bg-black/50 backdrop-blur-md border-b border-white/10">
        <a href="#hero" class="flex items-center gap-3">
            <img id="nav-logo" src="" alt="Logo" class="h-8 md:h-10 w-auto object-contain hidden">
            <span id="nav-brand" class="font-display text-xl md:text-2xl font-bold"></span>
        </a>
        
        <div class="hidden md:flex gap-8 font-bold uppercase text-xs tracking-widest items-center">
            <a href="#hero" id="link-inicio" class="hover:text-[var(--primary)] transition">Inicio</a>
            <a href="#nosotros" id="link-nosotros" class="hover:text-[var(--primary)] transition">Nosotros</a>
            <a href="#galeria" id="link-proyectos" class="hover:text-[var(--primary)] transition">Proyectos</a>
            <a href="#servicios" id="link-cotizador" class="hover:text-[var(--primary)] transition">Cotizador</a>
            <a href="#" id="nav-contact" target="_blank" class="bg-white text-black px-4 py-2 hover:bg-[var(--primary)] hover:text-white transition">Contacto</a>
        </div>

        <button onclick="toggleMenu()" class="md:hidden z-[200] flex flex-col gap-1.5 p-2">
            <div id="line1" class="w-6 h-0.5 bg-white transition"></div>
            <div id="line2" class="w-6 h-0.5 bg-white transition"></div>
        </button>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 bg-black z-[180] flex flex-col items-center justify-center gap-8 text-3xl font-display uppercase p-6">
        <a href="#hero" id="m-link-inicio" onclick="toggleMenu()">Inicio</a>
        <a href="#nosotros" id="m-link-nosotros" onclick="toggleMenu()">Nosotros</a>
        <a href="#galeria" id="m-link-proyectos" onclick="toggleMenu()">Proyectos</a>
        <a href="#servicios" id="m-link-cotizador" onclick="toggleMenu()">Cotizador</a>
        <a href="#" id="nav-contact-mobile" target="_blank" onclick="toggleMenu()" class="text-[var(--primary)]">Contacto</a>
    </div>

    <button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-8 right-8 w-14 h-14 bg-[var(--primary)] text-white rounded-full flex items-center justify-center text-2xl shadow-2xl hover:scale-110 transition border-2 border-white">
        ↑
    </button>

    <section id="hero" class="relative min-h-screen flex items-center px-6 pt-20">
        <div id="hero-bg" class="absolute inset-0 opacity-30 grayscale bg-cover bg-center"></div>
        <div class="relative z-10 max-w-5xl mx-auto">
            <h1 id="hero-title" class="text-5xl md:text-9xl font-black leading-none mb-6"></h1>
            <p id="hero-subtitle" class="text-lg md:text-2xl opacity-70 max-w-2xl mb-8"></p>
            <a href="#servicios" id="hero-cta" class="btn-brutalist uppercase"></a>
        </div>
    </section>

    <section id="nosotros" class="py-20 px-6 border-y border-white/10">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            <div data-aos="fade-right">
                <h2 id="about-title" class="text-5xl md:text-7xl font-display mb-6"></h2>
                <p id="about-desc" class="text-xl opacity-70 mb-8 leading-relaxed"></p>
                <div class="flex flex-wrap gap-4 items-center">
                    <div id="about-contact" class="font-bold text-[var(--primary)] uppercase tracking-widest mr-4"></div>
                    <a href="#" id="about-social-btn" target="_blank" class="border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition uppercase font-bold text-xs tracking-tighter">
                        Ver Redes Sociales
                    </a>
                </div>
            </div>
            <div class="relative" data-aos="fade-left">
                <div class="absolute -inset-4 border-2 border-[var(--primary)] translate-x-8 translate-y-8 hidden md:block"></div>
                <img id="about-img" src="" class="relative z-10 w-full h-[300px] md:h-[500px] object-cover grayscale">
            </div>
        </div>
    </section>

    <section id="galeria" class="py-20 px-6">
        <div class="max-w-7xl mx-auto">
            <h2 id="gal-title-text" class="text-4xl md:text-6xl font-display mb-12 uppercase">Servicios Recientes</h2>
            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <section id="servicios" class="py-20 px-6 white-section">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-8">
                <h2 id="serv-title-text" class="text-5xl md:text-8xl font-display leading-none uppercase">Presupuesto al Instante</h2>
                <div class="text-right w-full md:w-auto">
                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Inversión Estimada</p>
                    <div id="total-price" class="text-6xl md:text-8xl font-display">$0.00</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50">Tu Nombre</label>
                    <input type="text" id="lead-nombre" placeholder="ESCRIBE TU NOMBRE..." class="input-lead">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50">WhatsApp</label>
                    <input type="tel" id="lead-whatsapp" placeholder="EJ: 5076000000" class="input-lead">
                </div>
            </div>

            <div id="services-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <button onclick="enviarWhatsApp()" class="btn-brutalist w-full mt-12 text-xl py-6 uppercase">Solicitar Presupuesto</button>
        </div>
    </section>

    <div id="service-modal" class="modal">
        <div class="bg-[#111] border-2 border-[var(--primary)] max-w-xl w-full p-10 relative">
            <span class="absolute top-4 right-6 text-4xl cursor-pointer text-[var(--primary)]" onclick="closeModal()">&times;</span>
            <h3 id="modal-title" class="text-3xl font-display mb-4 text-white"></h3>
            <p id="modal-desc" class="text-xl opacity-80 mb-8 text-white"></p>
            <div class="flex justify-between items-center border-t border-white/10 pt-6">
                <span id="modal-price" class="text-2xl font-display text-white"></span>
                <button onclick="closeModal()" class="btn-brutalist py-2 px-6 text-sm">CERRAR</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6rNV8O3K_6-TAIvDe1fSNTHbjK7EdFhkxw7oLcupWEFGwPMDToDnJlYZDQitTo2CrEw/exec'; 
        let configGlobal, total = 0, seleccionados = [];

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const l1 = document.getElementById('line1');
            const l2 = document.getElementById('line2');
            menu.classList.toggle('active');
            l1.classList.toggle('rotate-45');
            l1.classList.toggle('translate-y-1');
            l2.classList.toggle('-rotate-45');
            l2.classList.toggle('-translate-y-1');
        }

        window.onscroll = function() {
            const btn = document.getElementById('back-to-top');
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        };

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                configGlobal = data.config;

                document.documentElement.style.setProperty('--primary', configGlobal.color_primario || '#8400db');
                document.getElementById('nav-brand').innerText = configGlobal.nombre_negocio;
                
                const logoImg = document.getElementById('nav-logo');
                if(configGlobal.logo_url) {
                    logoImg.src = configGlobal.logo_url;
                    logoImg.classList.remove('hidden');
                }

                document.getElementById('link-inicio').innerText = configGlobal.nav_inicio || 'Inicio';
                document.getElementById('m-link-inicio').innerText = configGlobal.nav_inicio || 'Inicio';
                
                document.getElementById('link-nosotros').innerText = configGlobal.nav_nosotros || 'Nosotros';
                document.getElementById('m-link-nosotros').innerText = configGlobal.nav_nosotros || 'Nosotros';
                
                document.getElementById('link-proyectos').innerText = configGlobal.nav_proyectos || 'Proyectos';
                document.getElementById('m-link-proyectos').innerText = configGlobal.nav_proyectos || 'Proyectos';
                
                document.getElementById('link-cotizador').innerText = configGlobal.nav_cotizador || 'Cotizador';
                document.getElementById('m-link-cotizador').innerText = configGlobal.nav_cotizador || 'Cotizador';

                document.getElementById('hero-bg').style.backgroundImage = `url('${configGlobal.hero_bg_url}')`;
                
                const waLink = `https://wa.me/${configGlobal.whatsapp_tel}`;
                document.getElementById('nav-contact').href = waLink;
                document.getElementById('nav-contact-mobile').href = waLink;

                if(configGlobal.titulo_galeria) document.getElementById('gal-title-text').innerText = configGlobal.titulo_galeria;
                if(configGlobal.titulo_cotizador) document.getElementById('serv-title-text').innerText = configGlobal.titulo_cotizador;

                const hero = data.content.find(c => c.Seccion_ID === 'hero');
                document.getElementById('hero-title').innerText = hero.Titulo;
                document.getElementById('hero-subtitle').innerText = hero.Subtitulo;
                document.getElementById('hero-cta').innerText = hero.CTA_Texto;

                document.getElementById('about-title').innerText = data.about.titulo;
                document.getElementById('about-desc').innerText = data.about.descripcion;
                document.getElementById('about-img').src = data.about.imagen_url;
                document.getElementById('about-contact').innerText = data.about.email;
                document.getElementById('about-social-btn').href = data.about.redes;

                data.gallery.forEach(item => {
                    document.getElementById('gallery-grid').innerHTML += `
                        <div class="brutalist-card overflow-hidden group" data-aos="fade-up">
                            <img src="${item.URL}" class="w-full h-64 object-cover grayscale group-hover:grayscale-0 transition duration-500">
                            <div class="p-4"><h4 class="font-display text-xl uppercase">${item.Titulo}</h4><p class="text-xs opacity-50">${item.Descripcion}</p></div>
                        </div>`;
                });

                data.services.forEach(s => {
                    if(String(s.Activo).toLowerCase() === "true") {
                        const div = document.createElement('div');
                        div.className = "brutalist-card p-6 flex justify-between items-center";
                        div.innerHTML = `
                            <div><h3 class="text-xl font-display">${s.Servicio}</h3>
                                <button onclick="openModal('${s.Servicio}', '${s.Descripcion}', '${s.Precio_Base}')" class="text-[10px] font-bold underline mt-2 uppercase opacity-60">Detalles</button>
                            </div>
                            <div class="flex items-center gap-4"><span class="font-bold text-xl">$${s.Precio_Base}</span>
                                <input type="checkbox" class="w-6 h-6 accent-[var(--primary)]" onchange="updateTotal(this, ${s.Precio_Base}, '${s.Servicio}')">
                            </div>`;
                        document.getElementById('services-list').appendChild(div);
                    }
                });

                document.getElementById('loader').style.display = 'none';
                AOS.init({ once: true });
            } catch (e) { console.error(e); }
        }

        function openModal(t, d, p) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('modal-price').innerText = `$${p}`;
            document.getElementById('service-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() { 
            document.getElementById('service-modal').classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }
        function updateTotal(cb, p, n) {
            if(cb.checked) { total += p; seleccionados.push(n); }
            else { total -= p; seleccionados = seleccionados.filter(i => i !== n); }
            document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;
        }

        async function enviarWhatsApp() {
            const nombre = document.getElementById('lead-nombre').value;
            const wa = document.getElementById('lead-whatsapp').value;

            if(!nombre || !wa) {
                alert("Por favor ingresa tu nombre y WhatsApp para procesar la cotización.");
                return;
            }

            // Registro silencioso del lead en el backend
            try {
                fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        lead: {
                            nombre: nombre,
                            whatsapp: wa,
                            servicios: seleccionados.join(', '),
                            total: total.toFixed(2)
                        }
                    })
                });
            } catch(e) { console.error("Error al registrar lead", e); }

            const num = configGlobal.whatsapp_tel;
            let msg = `*${configGlobal.nombre_negocio.toUpperCase()} - COTIZACIÓN*\\\\n\\\\n`;
            msg += `Nombre: ${nombre}\\\\n`;
            if (total > 0) msg += `Interés en:\\\\n${seleccionados.map(s => `- ${s}`).join('\\\\n')}\\\\n\\\\n*Total Estimado: $${total.toFixed(2)}*`;
            else msg += `Hola! Me gustaría recibir información personalizada.`;
            
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        }
        init();
    </script>
</body>
</html>
