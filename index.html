<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link id="font-link" rel="stylesheet" href="">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style id="custom-css"></style>
</head>
<body class="bg-white transition-colors duration-500">

    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <header class="min-h-screen flex flex-col items-center justify-center p-6 text-center max-w-4xl mx-auto">
        <img id="logo" src="" class="h-16 mb-8" data-aos="fade-down">
        <h1 id="title" class="text-5xl md:text-7xl font-bold mb-6" data-aos="fade-up"></h1>
        <p id="desc" class="text-xl text-gray-600 mb-10" data-aos="fade-up" data-delay="200"></p>
        <div id="cta-container" data-aos="zoom-in" data-delay="400"></div>
    </header>

    <section class="py-20 bg-slate-50 px-6">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-bold mb-6 text-center">Cotizador Online</h2>
            <div id="services-list" class="space-y-4 mb-8"></div>
            <div class="border-t pt-6 flex justify-between items-center">
                <span class="text-xl font-bold">Total Estimado:</span>
                <span id="total-price" class="text-3xl font-black text-blue-600">$0.00</span>
            </div>
            <button onclick="sendWA()" class="w-full mt-6 bg-green-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-600 transition-all flex items-center justify-center gap-2 shadow-lg">
                <i class="fab fa-whatsapp"></i> PEDIR POR WHATSAPP
            </button>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const API = "https://script.google.com/macros/s/AKfycbykA2Qhx3TIxybnu-jOF-hLq6ApD7HDC8LW7MbqpHGkT09LxO6JaACYHvETlLFZscecAQ/exec";
        let config, services = [], selected = [], total = 0;

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            config = data.config; services = data.services;
            
            render(data);
            document.getElementById('loader').classList.add('hidden');
            AOS.init();
        }

        function render(data) {
            // Estilos dinámicos
            document.getElementById('custom-css').innerHTML = `
                :root { --p: ${config.color_primario}; }
                h1, h2, h3 { color: var(--p); }
                .bg-primary { background-color: var(--p); }
            `;
            
            document.getElementById('title').innerText = data.content[0].Titulo;
            document.getElementById('desc').innerText = data.content[0].Subtitulo;
            document.getElementById('logo').src = config.logo_url;

            // Render servicios
            const list = document.getElementById('services-list');
            services.forEach(s => {
                if(s.Activo) {
                    list.innerHTML += `
                        <label class="flex items-center justify-between p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" onchange="calc('${s.Servicio}', ${s.Precio_Base}, this)" class="w-5 h-5 rounded border-gray-300">
                                <span class="font-medium">${s.Servicio}</span>
                            </div>
                            <span class="font-bold text-gray-500">$${s.Precio_Base}</span>
                        </label>`;
                }
            });
        }

        function calc(name, price, el) {
            if(el.checked) { total += price; selected.push(name); }
            else { total -= price; selected = selected.filter(i => i !== name); }
            document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;
        }

        function sendWA() {
            const msg = `¡Hola! Me interesa:\n- ${selected.join('\n- ')}\nTotal: $${total.toFixed(2)}`;
            window.open(`https://wa.me/${config.whatsapp_tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        }

        load();
    </script>
</body>
</html>
