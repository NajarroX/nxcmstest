<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... | Najarro X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --p: #0066FF; }
        .bg-primary { background-color: var(--p); }
        .text-primary { color: var(--p); }
        #loader { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-500 font-medium">Sincronizando con Najarro X CMS...</p>
    </div>

    <main id="app" class="opacity-0 transition-opacity duration-1000">
        <section id="hero" class="min-h-screen flex items-center justify-center text-center px-6 py-20 bg-white">
            <div class="max-w-4xl mx-auto" data-aos="fade-up">
                <img id="logo" src="" alt="Logo" class="h-16 mx-auto mb-8 hidden">
                <h1 id="hero-title" class="text-5xl md:text-7xl font-black mb-6"></h1>
                <p id="hero-subtitle" class="text-xl text-gray-600 mb-10 max-w-2xl mx-auto"></p>
                <a id="hero-cta" href="#cotizador" class="bg-primary text-white px-8 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition-transform inline-block"></a>
            </div>
        </section>

        <section id="portfolio" class="py-20 bg-gray-100 px-6">
            <h2 class="text-3xl font-bold text-center mb-12">Nuestros Proyectos</h2>
            <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto"></div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // --- CONFIGURACIÓN ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZl4BAk3XJ3rC2HF2q71zlxVwJjcJzgYhqTiJwlz9g_iM0TIB90cL8bd-IuWs1MXiY5g/exec';

        async function init() {
            try {
                // Llamada al motor de Google
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("Error en red");
                
                const data = await response.json();
                
                // 1. Aplicar Configuración Visual
                if (data.config.color_primario) {
                    document.documentElement.style.setProperty('--p', data.config.color_primario);
                }
                document.title = data.config.nombre_negocio || "Mi Web";
                if(data.config.logo_url) {
                    const logo = document.getElementById('logo');
                    logo.src = data.config.logo_url;
                    logo.classList.remove('hidden');
                }

                // 2. Renderizar Contenido Hero (Seccion_ID: hero)
                const heroData = data.content.find(item => item.Seccion_ID === 'hero');
                if (heroData) {
                    document.getElementById('hero-title').innerText = heroData.Titulo;
                    document.getElementById('hero-subtitle').innerText = heroData.Subtitulo;
                    document.getElementById('hero-cta').innerText = heroData.CTA_Texto;
                }

                // 3. Renderizar Galería
                const galleryGrid = document.getElementById('gallery-grid');
                data.gallery.forEach(item => {
                    galleryGrid.innerHTML += `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-lg" data-aos="zoom-in">
                            <img src="${item.URL}" class="w-full h-64 object-cover" alt="${item.Titulo}">
                            <div class="p-6">
                                <h3 class="font-bold text-xl">${item.Titulo}</h3>
                                <p class="text-gray-500 text-sm">${item.Descripcion}</p>
                            </div>
                        </div>
                    `;
                });

                // Finalizar carga
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
                    AOS.init();
                }, 500);

            } catch (error) {
                console.error("Error cargando CMS:", error);
                document.getElementById('loader').innerHTML = `
                    <div class="text-center p-6 bg-red-50 rounded-xl">
                        <p class="text-red-600 font-bold">Error de sincronización</p>
                        <p class="text-xs text-red-400 mt-2">Verifica la URL del script o los permisos de Google.</p>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
