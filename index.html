<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najarro X Estudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --p: #000; --hero-txt: #000; }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .bg-hero { background-size: cover; background-position: center; background-attachment: fixed; }
        #hero-content { color: var(--hero-txt); }
        .text-primary { color: var(--p); }
        .bg-primary { background-color: var(--p); }
        #mobile-menu { transform: translateX(100%); transition: transform 0.4s ease; }
        #mobile-menu.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-50 py-4 px-6 md:px-12 flex justify-between items-center bg-white/90 backdrop-blur-xl border-b border-gray-100">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <img id="logo" src="" class="h-8 hidden object-contain">
            <span id="nav-brand" class="font-black text-xl uppercase italic tracking-tighter"></span>
        </div>
        <div class="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest">
            <a href="#" class="hover:text-primary transition">Inicio</a>
            <a href="#proyectos" class="hover:text-primary transition">Proyectos</a>
            <a href="#servicios" class="hover:text-primary transition">Servicios</a>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="enviarWhatsApp()" class="hidden md:block bg-primary text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">Solicitar Cita</button>
            <button onclick="toggleMenu(true)" class="md:hidden flex flex-col gap-1.5 p-2">
                <div class="w-6 h-0.5 bg-black"></div><div class="w-6 h-0.5 bg-black"></div><div class="w-6 h-0.5 bg-black"></div>
            </button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white flex flex-col p-8">
        <div class="flex justify-end"><button onclick="toggleMenu(false)" class="text-4xl">&times;</button></div>
        <div class="flex flex-col gap-8 mt-12 text-4xl font-black italic uppercase tracking-tighter">
            <a href="#" onclick="toggleMenu(false)">Inicio</a>
            <a href="#proyectos" onclick="toggleMenu(false)">Proyectos</a>
            <a href="#servicios" onclick="toggleMenu(false)">Servicios</a>
        </div>
    </div>

    <section id="hero-section" class="relative min-h-screen flex items-center px-6 md:px-12 bg-hero">
        <div id="hero-content" class="max-w-5xl z-10" data-aos="fade-up">
            <h1 id="hero-title" class="text-5xl md:text-[8rem] font-black leading-[0.85] italic uppercase mb-8"></h1>
            <p id="hero-subtitle" class="text-lg md:text-3xl max-w-2xl mb-12 opacity-90"></p>
            <button id="hero-cta" onclick="document.getElementById('proyectos').scrollIntoView()" class="bg-primary text-white px-8 py-5 rounded-2xl font-black text-lg uppercase shadow-2xl"></button>
        </div>
        <div class="absolute inset-0 bg-black/10"></div>
    </section>

    <section id="proyectos" class="py-24 px-6 md:px-12 bg-gray-50 rounded-[3rem] -mt-10 relative z-20">
        <h2 class="text-4xl font-black italic uppercase mb-16">Proyectos</h2>
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <section id="servicios" class="py-24 px-6 md:px-12 max-w-6xl mx-auto">
        <h2 class="text-4xl md:text-6xl font-black italic uppercase text-center mb-16">Servicios</h2>
        <div class="grid lg:grid-cols-3 gap-12">
            <div id="services-list" class="lg:col-span-2 space-y-4"></div>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 lg:sticky lg:top-32 h-fit text-center">
                <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Presupuesto Estimado</p>
                <div id="total-price" class="text-5xl font-black italic mb-8">$0.00</div>
                <button onclick="enviarWhatsApp()" class="w-full bg-primary text-white py-6 rounded-2xl font-black text-lg uppercase italic shadow-xl">Enviar a WhatsApp</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center flex flex-col items-center gap-6">
        <p class="text-black font-black text-[10px] uppercase tracking-[0.5em]">Najarro X Estudio © 2026</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6rNV8O3K_6-TAIvDe1fSNTHbjK7EdFhkxw7oLcupWEFGwPMDToDnJlYZDQitTo2CrEw/exec'; 
        let configGlobal = {};
        let total = 0;
        let seleccionados = [];

        function toggleMenu(open) {
            document.getElementById('mobile-menu').classList.toggle('open', open);
            document.body.style.overflow = open ? 'hidden' : 'auto';
        }

        async function init() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                configGlobal = data.config;

                document.getElementById('nav-brand').innerText = configGlobal.nombre_negocio || "Najarro X";
                document.documentElement.style.setProperty('--p', configGlobal.color_primario || '#000');
                document.documentElement.style.setProperty('--hero-txt', configGlobal.hero_text_color || '#000');
                if(configGlobal.hero_bg_url) document.getElementById('hero-section').style.backgroundImage = `url('${configGlobal.hero_bg_url}')`;
                if(configGlobal.logo_url) { const l = document.getElementById('logo'); l.src = configGlobal.logo_url; l.classList.remove('hidden'); }

                const hero = data.content.find(c => c.Seccion_ID.toLowerCase() === 'hero');
                document.getElementById('hero-title').innerText = hero.Titulo;
                document.getElementById('hero-subtitle').innerText = hero.Subtitulo;
                document.getElementById('hero-cta').innerText = hero.CTA_Texto || "Ver Proyectos";

                // GALERIA
                const gal = document.getElementById('gallery-grid');
                data.gallery.forEach(item => {
                    gal.innerHTML += `<div class="bg-white rounded-[2rem] overflow-hidden shadow-lg"><img src="${item.URL}" class="w-full h-64 object-cover"><div class="p-6"><h3 class="font-black uppercase italic">${item.Titulo}</h3><p class="text-gray-400 text-sm">${item.Descripcion}</p></div></div>`;
                });

                // SERVICIOS (Aquí es donde estaba el fallo)
                const srv = document.getElementById('services-list');
                data.services.forEach(s => {
                    if(String(s.Activo).toUpperCase() === "TRUE") {
                        // Limpiamos el valor para que sea un número real
                        let val = String(s.Precio_Base).replace(/[^0-9.]/g, '');
                        let pNum = parseFloat(val) || 0;
                        
                        srv.innerHTML += `
                            <label class="flex justify-between items-center p-6 border-2 rounded-[2rem] cursor-pointer hover:border-primary bg-white group">
                                <div class="flex items-center gap-4">
                                    <input type="checkbox" class="w-6 h-6 rounded-full" onchange="calc(this, '${pNum}', '${s.Servicio}')">
                                    <div>
                                        <p class="font-black text-xl italic uppercase group-hover:text-primary">${s.Servicio}</p>
                                        <p class="text-gray-400 text-xs">${s.Descripcion || ''}</p>
                                    </div>
                                </div>
                                <span class="font-black text-xl italic">$${pNum.toFixed(2)}</span>
                            </label>`;
                    }
                });
                AOS.init();
            } catch (e) { console.error(e); }
        }

        function calc(cb, precio, nombre) {
            const p = parseFloat(precio);
            if(cb.checked) {
                total += p;
                seleccionados.push(nombre);
            } else {
                total -= p;
                seleccionados = seleccionados.filter(x => x !== nombre);
            }
            document.getElementById('total-price').innerText = `$${Math.max(0, total).toFixed(2)}`;
        }

        function enviarWhatsApp() {
            const num = configGlobal.whatsapp_tel || "507";
            const marca = configGlobal.nombre_negocio || "Najarro X";
            let msg = `¡Hola ${marca}! 👋\n\n`;
            if (total > 0) {
                msg += `Me interesa contratar estos servicios:\n\n`;
                seleccionados.forEach(s => msg += `✅ *${s}*\n`);
                msg += `\n*Presupuesto Estimado:* $${total.toFixed(2)}\n\n¿Podemos hablar?`;
            } else {
                msg += `Me gustaría recibir información sobre sus servicios.`;
            }
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        init();
    </script>
</body>
</html>
