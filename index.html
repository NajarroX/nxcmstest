<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najarro X Estudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --p: #000; --hero-txt: #000; }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .bg-hero { background-size: cover; background-position: center; background-attachment: fixed; }
        #hero-content { color: var(--hero-txt); }
        .text-primary { color: var(--p); }
        .bg-primary { background-color: var(--p); }
        
        /* Estilos para el menú móvil */
        #mobile-menu {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #mobile-menu.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-50 py-4 px-6 md:px-12 flex justify-between items-center bg-white/90 backdrop-blur-xl border-b border-gray-100">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <img id="logo" src="" class="h-8 hidden object-contain">
            <span id="nav-brand" class="font-black text-xl uppercase italic tracking-tighter"></span>
        </div>
        
        <div class="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest">
            <a href="#" class="hover:text-primary transition">Inicio</a>
            <a href="#proyectos" class="hover:text-primary transition">Proyectos</a>
            <a href="#servicios" class="hover:text-primary transition">Servicios</a>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="enviarWhatsApp()" class="hidden md:block bg-primary text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">Solicitar Cita</button>
            
            <button onclick="toggleMenu(true)" class="md:hidden flex flex-col gap-1.5 p-2">
                <div class="w-6 h-0.5 bg-black"></div>
                <div class="w-6 h-0.5 bg-black"></div>
                <div class="w-6 h-0.5 bg-black"></div>
            </button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white flex flex-col p-8">
        <div class="flex justify-end">
            <button onclick="toggleMenu(false)" class="text-4xl font-light">&times;</button>
        </div>
        <div class="flex flex-col gap-8 mt-12 text-4xl font-black italic uppercase tracking-tighter">
            <a href="#" onclick="toggleMenu(false)">Inicio</a>
            <a href="#proyectos" onclick="toggleMenu(false)">Proyectos</a>
            <a href="#servicios" onclick="toggleMenu(false)">Servicios</a>
        </div>
        <div class="mt-auto border-t pt-8">
            <button onclick="enviarWhatsApp(); toggleMenu(false)" class="w-full bg-primary text-white py-6 rounded-2xl font-black text-xl italic uppercase tracking-tighter shadow-2xl">Solicitar Cita</button>
        </div>
    </div>

    <section id="hero-section" class="relative min-h-screen flex items-center px-6 md:px-12 bg-hero transition-all duration-700">
        <div id="hero-content" class="max-w-5xl z-10" data-aos="fade-up">
            <h1 id="hero-title" class="text-5xl md:text-[8rem] font-black leading-[0.85] tracking-tighter italic uppercase mb-8"></h1>
            <p id="hero-subtitle" class="text-lg md:text-3xl max-w-2xl mb-12 font-medium opacity-90"></p>
            <button id="hero-cta" onclick="document.getElementById('proyectos').scrollIntoView()" 
                    class="bg-primary text-white px-8 py-5 md:px-12 md:py-6 rounded-2xl font-black text-lg md:text-xl italic uppercase tracking-tighter shadow-2xl hover:scale-105 transition"></button>
        </div>
        <div class="absolute inset-0 bg-black/10"></div>
    </section>

    <section id="proyectos" class="py-24 md:py-32 px-6 md:px-12 bg-gray-50 rounded-[3rem] md:rounded-[4rem] -mt-10 relative z-20">
        <div class="mb-16 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <h2 class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter">Proyectos</h2>
            <p class="text-gray-400 font-bold uppercase text-[10px] tracking-[0.3em]">Portfolio 2026</p>
        </div>
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <section id="servicios" class="py-24 md:py-32 px-6 md:px-12 max-w-6xl mx-auto">
        <div class="text-center mb-16 md:mb-20">
            <h2 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter">Servicios</h2>
            <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mt-4">Personaliza tu propuesta digital</p>
        </div>
        <div class="grid lg:grid-cols-3 gap-12">
            <div id="services-list" class="lg:col-span-2 space-y-4"></div>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 lg:sticky lg:top-32 h-fit">
                <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Presupuesto Estimado</p>
                <div id="total-price" class="text-5xl md:text-6xl font-black italic mb-8">$0.00</div>
                <button onclick="enviarWhatsApp()" class="w-full bg-primary text-white py-6 rounded-2xl font-black text-lg uppercase italic tracking-tighter hover:brightness-110 transition shadow-xl">
                    Enviar a WhatsApp
                </button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-gray-50 flex flex-col items-center gap-6">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-[10px] font-black uppercase tracking-widest border-b-2 border-black pb-1 hover:text-gray-400 hover:border-gray-400 transition">Regresar al Inicio</button>
        <p class="text-black font-black text-[10px] uppercase tracking-[0.5em]">Najarro X Estudio © 2026</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6rNV8O3K_6-TAIvDe1fSNTHbjK7EdFhkxw7oLcupWEFGwPMDToDnJlYZDQitTo2CrEw/exec'; 
        let configGlobal = {};
        let total = 0;
        let seleccionados = [];

        function toggleMenu(open) {
            const menu = document.getElementById('mobile-menu');
            if (open) {
                menu.classList.add('open');
                document.body.style.overflow = 'hidden';
            } else {
                menu.classList.remove('open');
                document.body.style.overflow = 'auto';
            }
        }

        async function init() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                configGlobal = data.config;

                const marca = configGlobal.nombre_negocio || "Najarro X";
                document.getElementById('nav-brand').innerText = marca;
                document.title = marca;
                document.documentElement.style.setProperty('--p', configGlobal.color_primario || '#000');
                document.documentElement.style.setProperty('--hero-txt', configGlobal.hero_text_color || '#000');
                
                if(configGlobal.hero_bg_url) document.getElementById('hero-section').style.backgroundImage = `url('${configGlobal.hero_bg_url}')`;
                if(configGlobal.logo_url) {
                    const l = document.getElementById('logo');
                    l.src = configGlobal.logo_url;
                    l.classList.remove('hidden');
                }

                const hero = data.content.find(c => c.Seccion_ID.toLowerCase() === 'hero');
                document.getElementById('hero-title').innerText = hero.Titulo;
                document.getElementById('hero-subtitle').innerText = hero.Subtitulo;
                document.getElementById('hero-cta').innerText = hero.CTA_Texto || "Ver Proyectos";

                const gal = document.getElementById('gallery-grid');
                data.gallery.forEach(item => {
                    gal.innerHTML += `
                        <div class="group rounded-[2.5rem] overflow-hidden bg-white shadow-lg hover:shadow-2xl transition" data-aos="fade-up">
                            <img src="${item.URL}" class="w-full h-80 object-cover group-hover:scale-105 transition duration-700">
                            <div class="p-8">
                                <h3 class="font-black text-2xl uppercase italic tracking-tighter mb-2">${item.Titulo}</h3>
                                <p class="text-gray-400 text-sm font-medium leading-relaxed">${item.Descripcion}</p>
                            </div>
                        </div>`;
                });

                const srv = document.getElementById('services-list');
                data.services.forEach(s => {
                    if(String(s.Activo).toUpperCase() === "TRUE") {
                        srv.innerHTML += `
                            <label class="flex justify-between items-center p-6 md:p-8 border-2 rounded-[2rem] cursor-pointer hover:border-primary transition bg-white group shadow-sm">
                                <div class="flex items-center gap-4 md:gap-6">
                                    <input type="checkbox" class="w-6 h-6 md:w-8 md:h-8 rounded-full border-gray-300 text-primary focus:ring-primary" 
                                           onchange="calc(this, '${s.Precio_Base}', '${s.Servicio}')">
                                    <div>
                                        <p class="font-black text-xl md:text-2xl italic uppercase tracking-tighter group-hover:text-primary transition">${s.Servicio}</p>
                                        <p class="text-gray-400 text-xs md:text-sm font-medium">${s.Descripcion}</p>
                                    </div>
                                </div>
                                <span class="font-black text-xl md:text-2xl italic tracking-tighter">$${s.Precio_Base}</span>
                            </label>`;
                    }
                });

                AOS.init();
            } catch (e) { console.error(e); }
        }

        function calc(cb, precio, nombre) {
            const p = parseFloat(precio) || 0;
            if(cb.checked) { total += p; seleccionados.push(nombre); }
            else { total -= p; seleccionados = seleccionados.filter(x => x !== nombre); }
            document.getElementById('total-price').innerText = `$${Math.max(0, total).toFixed(2)}`;
        }

        function enviarWhatsApp() {
            const num = configGlobal.whatsapp_tel || "507";
            const marca = configGlobal.nombre_negocio || "Najarro X";
            let msg = `¡Hola ${marca}! 👋\n\n`;
            if (total > 0) {
                msg += `Me gustaría recibir una propuesta formal para los siguientes servicios:\n\n`;
                seleccionados.forEach(s => msg += `✅ *${s}*\n`);
                msg += `\n*Presupuesto Estimado:* $${total.toFixed(2)}\n\n`;
                msg += `Quedo atento(a) para coordinar los siguientes pasos.`;
            } else {
                msg += `Me gustaría recibir más información sobre el estudio creativo y sus servicios.`;
            }
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
